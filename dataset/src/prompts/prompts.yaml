# Prompts for Dataset Generation Pipeline
# All prompts are in English

scene_generation:
  system: |
    You are a life scene generator. Given a person's profile, you generate realistic scenes from their daily life.

    IMPORTANT: Write scenes as if they are being RECORDED by a voice recorder that the person is wearing.
    The person KNOWS they are being recorded and describes what they're doing or talks with others.

    Scene format:
    - Written as PURE SPOKEN DIALOGUE only (no sound effects, no actions in brackets/asterisks)
    - Use newlines to separate different moments or speakers
    - Natural speech patterns, casual language
    - Include conversations with others (greetings, small talk, plans)
    - Person narrates their activities: "I'm going for a run now", "Time to make breakfast"

    DO NOT include:
    - Sound effects: [door closes], [phone rings], [footsteps]
    - Action descriptions: *yawn*, *sigh*, *stretches*, *typing sounds*
    - Emotional markers: *happily*, *tiredly*

    Examples of GOOD scenes:
    - "Okay it's 7 AM time to get up.\nLet me check my phone.\nOh message from Luca.\nHey man wanna grab coffee later?\nSure why not.\nAlright I'm gonna go for a run first."
    - "Ciao Maria! Come stai?\nBene bene e tu?\nYes yes the project is going well.\nWe should meet Thursday for lunch what do you think?\nSounds perfect!"
    - "Finished that email.\nTime for a break.\nI'll make some coffee.\nWhere did I put those beans.\nAh here they are."

    Examples of BAD scenes:
    - "*yawn* Okay it's 7 AM [alarm ringing] *stretches*" (NO sound effects or actions!)
    - "Marco wakes up at 7 AM and checks his phone." (NO third person narrative!)

    Generate scenes that provide enough context for health monitoring devices to capture meaningful data.

  user_template: |
    Profile:
    {profile}
    {previous_scenes}
    Generate scene #{scene_number} of {total_scenes}.

    IMPORTANT: Make this scene DIFFERENT from previous scenes:
    - Use different days and times of day
    - Show different activities (don't repeat the same activity)
    - Vary the conversations and social interactions
    - Explore different aspects of the person's life

    Remember: ONLY spoken dialogue use newlines to separate moments NO sound effects or action markers!

    Return ONLY a JSON object with this structure:
    {{
      "scene_id": {scene_number},
      "day": "Monday/Tuesday/etc",
      "time": "morning/afternoon/evening/night",
      "description": "Recorded dialogue here"
    }}

device_data_generation:
  system: |
    You are a device data generator. Given a life scene, you generate plausible sensor data from personal and smart home devices WITH TIMESTAMPS.

    Available devices:
    {devices_config}

    CRITICAL: All sensor readings MUST have timestamps!

    For each scene, analyze what devices would capture and generate realistic data within the specified ranges.
    Consider:
    - Activity level (sedentary, light, moderate, intense)
    - Time of day (affects heart rate, body temp, home lighting, thermostat)
    - Context (work, exercise, sleep, meals, home/away)
    - Location (at home, outside, traveling)
    - Realistic correlations (high steps = high heart rate, sleep = low movement, nighttime = lights off, away = doors locked)

    SMARTWATCH/SMARTRING - Time series data:
    - Generate 3-5 timestamped readings during the scene
    - Heart rate changes based on activity (resting: 60-80, walking: 80-100, exercise: 120-160)
    - Steps accumulate over time
    - Format: [{{"timestamp": "HH:MM:SS", "heart_rate": 75, "steps": 120}}, ...]

    GPS - Movement trajectory:
    - If scene mentions movement (going to gym, walking to library, etc.) → generate GPS trajectory with 3-5 waypoints
    - Each waypoint has timestamp + lat/lon that shows actual movement
    - If sedentary (at home, sitting) → single GPS point or minimal movement
    - Speed should match activity (walking: 4-6 km/h, driving: 20-50 km/h, stationary: 0)
    - Format: [{{"timestamp": "HH:MM:SS", "latitude": 37.7749, "longitude": -122.4194, "speed": 5.0}}, ...]

    Smart home data should reflect:
    - Doors/windows: locked when sleeping or away, open when at home during day
    - Temperature/humidity: comfortable range when at home, may vary when away
    - Motion sensors: active when person is at home, inactive when away
    - Lights: on when active at home, off when sleeping or away
    - Alarm: armed when away or sleeping, disarmed when at home and awake
    - Gas/smoke: always false (safe) unless there's an emergency scenario

  user_template: |
    Scene:
    {scene_description}

    Generate plausible device data for this scene WITH TIMESTAMPS for time-series sensors.

    IMPORTANT:
    - Smartwatch/smartring: Generate array of timestamped readings (3-5 samples)
    - GPS: If movement mentioned → generate trajectory with 3-5 waypoints showing actual lat/lon changes
    - GPS: If sedentary → single point or minimal movement
    - All timestamps in HH:MM:SS format
    - Ensure GPS coordinates CHANGE if person is moving between locations!

    Return ONLY a JSON object with this structure:
    {{
      "smartwatch": [
        {{"timestamp": "14:00:00", "heart_rate": 75, "steps": 120, "active_minutes": 5}},
        {{"timestamp": "14:15:00", "heart_rate": 82, "steps": 450, "active_minutes": 15}},
        ...
      ],
      "gps": [
        {{"timestamp": "14:00:00", "latitude": 37.7749, "longitude": -122.4194, "speed": 0.0, "accuracy": 10}},
        {{"timestamp": "14:10:00", "latitude": 37.7755, "longitude": -122.4200, "speed": 4.5, "accuracy": 10}},
        ...
      ],
      "smartphone": {{"screen_time_minutes": value, "notifications_count": value, "battery_level": value, ...}},
      "smartring": [
        {{"timestamp": "14:00:00", "body_temperature": 36.8, "hrv": 70, "skin_temperature": 32.5}},
        ...
      ],
      "smart_home": {{"doors_status": {{}}, "windows_status": {{}}, "indoor_temperature": value, ...}}
    }}

calendar_generation:
  system: |
    You are a calendar event generator. Given a life scene, you generate plausible calendar events that would be scheduled for that time period.

    Calendar events should be REALISTIC like a real person's calendar:
    - Work meetings: "Q3 Review", "Sprint Planning", "1:1 with Manager", "Client Call", "Team Sync"
    - Doctor appointments: "Dentist Appointment", "Annual Checkup", "Physical Therapy"
    - Social events: "Dinner with Sarah", "Book Club", "Game Night", "Birthday Party - Marco"
    - Personal tasks: "Gym Session", "Grocery Shopping", "Car Service", "Haircut"
    - Reminders: "Submit Report", "Pay Bills", "Renew Insurance"

    DO NOT create events for obvious activities like "Morning Run" or "Breakfast" - these are NOT typically in calendars.
    Only include events that a real person would actually schedule/calendar.

    Format events like a real calendar app (Google Calendar, Outlook, etc.)

  user_template: |
    Scene:
    {scene_description}

    Generate 0-3 calendar events relevant to this scene (only actual scheduled events, not routine activities).

    Return ONLY a JSON object with this structure:
    {{
      "events": [
        {{
          "title": "Event title",
          "start_time": "HH:MM",
          "end_time": "HH:MM",
          "location": "Place or Online",
          "description": "Optional details"
        }}
      ]
    }}

messaging_generation:
  system: |
    You are a messaging app data generator. Given a life scene, you generate plausible messages that the person might send/receive during that time.

    Messages should:
    - Be coherent with the scene (work messages during work, personal during free time)
    - Include realistic conversation patterns
    - Vary in formality (work, friends, family)
    - Include sender/receiver, timestamp, platform
    - Be brief and natural (like real messages)

    Common platforms: WhatsApp, SMS, Telegram, Slack, Email

  user_template: |
    Scene:
    {scene_description}

    Profile:
    {profile}

    Generate 0-8 messages relevant to this scene.

    Return ONLY a JSON object with this structure:
    {{
      "messages": [
        {{
          "platform": "WhatsApp/SMS/Slack/Email",
          "direction": "sent/received",
          "contact": "Contact name",
          "timestamp": "HH:MM",
          "content": "Message text"
        }}
      ]
    }}

deficiency_detection:
  system: |
    You are a health deficiency detection agent. Given a life scene and associated device data, you identify potential health deficiencies.

    Health categories to evaluate:
    {deficiencies_config}

    For each category, assess:
    - Is the data sufficient to evaluate?
    - Are values within healthy ranges?
    - Are there concerning patterns?
    - What is missing or insufficient?

    IMPORTANT: Use the provided tools to validate metrics, but ONLY call tools when you have actual numeric values.
    DO NOT call tools with null/missing values - instead, mark that category as UNKNOWN in your final response.

    Example:
    - If sleep_duration is available in device data → call validate_sleep_duration tool
    - If sleep_duration is null/missing → DO NOT call tool, set sleep status to UNKNOWN

  user_template: |
    Scene:
    {scene_description}

    Device Data:
    {device_data}

    Calendar Events:
    {calendar_events}

    Messages:
    {messages}

    Analyze this scene and detect health deficiencies.
    ONLY call validation tools for metrics that have actual values (not null or missing).

    Return ONLY a JSON object with this structure:
    {{
      "physical_activity": {{"status": "OK/WARNING/INSUFFICIENT", "reason": "Explanation"}},
      "sleep": {{"status": "OK/WARNING/INSUFFICIENT/UNKNOWN", "reason": "Explanation"}},
      "stress": {{"status": "OK/WARNING/HIGH/UNKNOWN", "reason": "Explanation"}},
      "workload": {{"status": "OK/WARNING/OVERLOADED/UNKNOWN", "reason": "Explanation"}},
      "social_interaction": {{"status": "OK/WARNING/INSUFFICIENT", "reason": "Explanation"}},
      "environment": {{"status": "OK/COLD/HOT/NOISY/DARK/UNKNOWN", "reason": "Explanation"}},
      "emotional_tone": {{"status": "POSITIVE/NEUTRAL/NEGATIVE/UNKNOWN", "reason": "Explanation"}},
      "digital_behavior": {{"status": "BALANCED/OVERCONNECTED/INACTIVE/UNKNOWN", "reason": "Explanation"}}
    }}

query_generation:
  system: |
    You are an evaluation query generator for a Personal Knowledge Graph system. Given a synthetic life scene with sensor data, you create 8 test queries following strict specifications.

    Your task: Generate exactly 8 queries with this distribution:
    - 2 TEMPORAL GROUNDING (1 exact time + 1 binary yes/no)
    - 2 CROSS-MODAL (multiple choice, connecting dialogue with other modalities)
    - 1 DEDUPLICATION (exact number)
    - 2 HALLUCINATION (binary yes/no about events that did NOT happen)
    - 1 COMPLETENESS (binary or exact, verifying coverage of an explicit fact)

    CRITICAL RULES:
    1. All answers MUST be derivable ONLY from provided data
    2. Binary questions must have unambiguous Yes/No answers
    3. Multiple choice must have exactly 1 correct answer
    4. Distractors must be plausible but clearly wrong (not mentioned in data)
    5. Hallucination questions ask about absent events (answer always "No")
    6. COMPLETENESS questions must test whether an EXPLICIT, IMPORTANT fact mentioned in the scene is captured (answer should be "Yes" or an exact small number)
    7. IMPORTANT FOR DOWNSTREAM PKG: Phrase questions so they remain answerable from triples (entities/relations/timestamps/topics). Avoid requiring raw sensor arrays, exact GPS coordinates, or long verbatim message content.

    TEMPORAL GROUNDING:
    - Use timestamps from calendar or clear time mentions in messages/dialogue or time-series sensors
    - Ask "What time did [event] occur?" → Answer: "HH:MM"
    - Ask "Did [event] happen before/after [time]?" → Answer: "Yes" or "No"

    CROSS-MODAL:
    - Connect EXPLICIT dialogue mentions with another modality (calendar, messages metadata, device high-level facts)
    - Avoid physiological claims unless explicitly supported by dialogue
    - 4 options (A correct, B/C/D distractors not in data)

    DEDUPLICATION:
    - Count UNIQUE events even if mentioned multiple times (answer is a number)

    HALLUCINATION:
    - Ask about plausible but absent events (answer always "No")
    - NEVER ask about things mentioned even once (even as plans)

    COMPLETENESS:
    - Ask about a fact that SHOULD be present if extraction is complete
    - Example patterns:
      * "Is there any evidence in the data that the user attended [explicit event]?" (Yes)
      * "How many distinct calendar events are scheduled in this scene?" (0-3 exact)
      * "Is there any evidence that the user interacted with [explicit person mentioned]?" (Yes)
    - Keep it easy to score and not dependent on raw sensor sample counts.

  user_template: |
    Generate 8 evaluation queries for this scene:

    Scene Description (Dialogue):
    {scene_description}

    Device Data:
    {device_data}

    Calendar Events:
    {calendar_events}

    Messages:
    {messages}

    Day: {day}
    Time: {time}

    Return ONLY a JSON object with this structure:
    {{
      "queries": [
        {{
          "id": "Q1",
          "category": "temporal",
          "type": "exact",
          "question": "Question text?",
          "answer": "Answer text",
          "rationale": "How answer derives from data"
        }},
        {{
          "id": "Q2",
          "category": "temporal",
          "type": "binary",
          "question": "Question text?",
          "answer": "Yes/No",
          "rationale": "How answer derives from data"
        }},
        {{
          "id": "Q3",
          "category": "cross_modal",
          "type": "multiple_choice",
          "question": "Question text?",
          "options": {{
            "A": "Option A",
            "B": "Option B",
            "C": "Option C",
            "D": "Option D"
          }},
          "answer": "A",
          "rationale": "Why A is correct and B/C/D are wrong"
        }},
        {{
          "id": "Q4",
          "category": "cross_modal",
          "type": "multiple_choice",
          "question": "Question text?",
          "options": {{
            "A": "Option A",
            "B": "Option B",
            "C": "Option C",
            "D": "Option D"
          }},
          "answer": "A",
          "rationale": "Why A is correct and B/C/D are wrong"
        }},
        {{
          "id": "Q5",
          "category": "deduplication",
          "type": "exact",
          "question": "Question text?",
          "answer": "A number",
          "rationale": "How answer derives from data"
        }},
        {{
          "id": "Q6",
          "category": "hallucination",
          "type": "binary",
          "question": "Question text?",
          "answer": "No",
          "rationale": "Why this did not happen"
        }},
        {{
          "id": "Q7",
          "category": "hallucination",
          "type": "binary",
          "question": "Question text?",
          "answer": "No",
          "rationale": "Why this did not happen"
        }},
        {{
          "id": "Q8",
          "category": "completeness",
          "type": "binary",
          "question": "Question text?",
          "answer": "Yes/No or small exact number",
          "rationale": "How answer derives from data"
        }}
      ]
    }}

    Query distribution:
    - Q1: temporal (exact)
    - Q2: temporal (binary)
    - Q3: cross_modal (multiple_choice)
    - Q4: cross_modal (multiple_choice)
    - Q5: deduplication (exact)
    - Q6: hallucination (binary)
    - Q7: hallucination (binary)
    - Q8: completeness (binary or exact)

    EXAMPLES OF GOOD vs BAD QUERIES:

    ❌ BAD TEMPORAL:
    Dialogue: "I finished project" (message at 18:38)
    Q: "Did user finish before 18:30?"
    A: "Yes" (rationale: "mentioned at 18:38 implies finished before")
    → WRONG! Mentioned at 18:38 means happened AT OR BEFORE 18:38, not necessarily before 18:30

    ✅ GOOD TEMPORAL:
    Dialogue: "I finished project" (message at 18:38)
    Q: "Did user mention finishing their project after 18:30?"
    A: "Yes" (rationale: "Message sent at 18:38 which is after 18:30")

    ❌ BAD CROSS-MODAL:
    Dialogue: "I hope I don't get too tired later at work"
    Q: "Why did user mention being tired?"
    → WRONG! User mentioned FUTURE WORRY, not current tiredness

    ✅ GOOD CROSS-MODAL:
    Dialogue: "I'm tired after the gym" + HR data shows 145 bpm + calendar shows gym session
    Q: "Why was user tired?"
    A: "High heart rate (145 bpm) from gym workout"

    ❌ BAD CROSS-MODAL (no mention):
    Dialogue: "I'm heading to the gym with Davide"
    Q: "Why did user mention being tired?"
    → WRONG! User NEVER mentioned being tired!

    ✅ GOOD CROSS-MODAL (specific to scene):
    Dialogue: "Traffic is crazy today" + GPS shows speed 5 km/h
    Q: "What caused the user's frustration according to dialogue and sensors?"
    A: "Slow traffic (GPS speed 5 km/h) as mentioned in conversation"

    ❌ BAD PHYSIOLOGICAL:
    Dialogue: "Long day of coding" + HR 60-65 bpm
    Q: "Why was user tired?"
    A: "Low heart rate indicates fatigue"
    → WRONG! HR 60-65 is NORMAL resting HR, not fatigue indicator!

    ✅ GOOD PHYSIOLOGICAL:
    Dialogue: "Intense workout" + HR 145 bpm + calories 420
    Q: "What physical activity is supported by sensor data?"
    A: "High heart rate (145 bpm) and calories (420) confirm intense workout"

    ✅ GOOD COMPLETENESS:
    Dialogue: "I have a dentist appointment at 15:00" + Calendar event: Dentist Appointment 15:00-15:30
    Q: "Is there evidence that the user had a dentist appointment?"
    A: "Yes"
    → Rationale: Calendar shows Dentist Appointment at 15:00, and dialogue mentions it.

    ❌ BAD COMPLETENESS:
    Q: "How many GPS points were recorded during the day?"
    → WRONG! This depends on raw sensor sampling, not reliably represented in triples.
